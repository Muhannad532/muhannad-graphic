<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مهند جرافيك | Muhannad Graphic</title>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%;
            overflow: hidden; 
            background-color: #000; 
        }
        .background {
            background: url('bg.png') no-repeat center center;
            background-size: contain; /* يضمن ظهور تصميمك كاملاً دون قص */
            width: 100%;
            height: 100vh;
            position: relative;
            margin: 0 auto;
        }
        /* تصميم مربع الضغط - تم إخفاء الإطار الأحمر */
        .link-box {
            position: absolute;
            width: 65%; /* عرض مناسب للجوال */
            height: 55px; /* طول مناسب للأزرار */
            left: 50%;
            transform: translateX(-50%); /* لتوسيط المربع في الشاشة */
            display: block;
            border: none; /* تم إزالة الخطوط الحمراء */
            border-radius: 30px; /* ليطابق شكل الزر في تصميمك */
            cursor: pointer;
            text-decoration: none;
            z-index: 10;
        }
    </style>
</head>
<body>

        <a href="https://www.instagram.com/by.muhannad1?igsh=MWdwaXdudmhodzl1ZQ%3D%3D&utm_source=qr" class="link-box" style="top: 32%;"></a>
