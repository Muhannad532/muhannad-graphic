<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مهند جرافيك | Muhand Graphic</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        .background {
            background: url('bg.png') no-repeat center center fixed;
            background-size: cover;
            width: 100%;
            height: 100vh;
            position: relative;
        }
        /* هذا هو الزر المخفي */
        .link-box {
            position: absolute;
            width: 80%; /* عرض الزر */
            height: 60px; /* طول الزر */
            left: 10%;
            /* border: 1px solid red;  احذف هذا السطر لإخفاء المربع بعد التجربة */
        }
    </style>
</head>
<body>
    <div class="background">
        <a href="رابط_الواتساب_هنا" class="link-box" style="top: 40%;"></a>
        <a href="رابط_أعمالك_هنا" class="link-box" style="top: 50%;"></a>
        <a href="رابط_الشهادة_هنا" class="link-box" style="top: 60%;"></a>
    </div>
</body>
</html>
